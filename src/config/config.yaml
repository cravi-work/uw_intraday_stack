  rolling_window_predictions: 500
  drift:
    brier_warn: 0.25
    brier_bad: 0.3
    logloss_warn: 0.85
    logloss_bad: 1.1
  bounds:
    weights:
      min: -1.0
      max: 1.0
      max_step: 0.05
    confidence_cap:
      min: 0.55
      max: 0.9
      max_step: 0.05
    flat_from_data_quality_scale:
      min: 0.1
      max: 0.9
      max_step: 0.1
    calibration:
