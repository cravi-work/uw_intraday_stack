system:
  api_key_env: UW_API_KEY
ingestion:
  timezone: America/New_York
  watchlist:
  - INTC
  cadence_minutes: 5
  # Choose how the prediction snapshot time (as-of) is rounded.
  #
  # `cadence_minutes` controls how frequently the job runs.
  # `asof_rounding_minutes` controls how far the as-of timestamp can lag "now" when
  # starting mid-cadence.
  #
  # Keeping this small (e.g. 1) avoids "future timestamp" look-ahead blocks when the
  # process starts in the middle of an ingest cadence bucket.
  asof_rounding_minutes: 1
  ingest_start_et: 04:00
  ingest_end_et: '20:00'
  premarket_start_et: 04:00
  regular_start_et: 09:30
  regular_end_et: '16:00'
  afterhours_end_et: '20:00'
  enable_market_context: true
  volume_profile_top_n: 7
  darkpool_band_width: 0.5
  darkpool_top_n: 7
  wall_top_n: 5
  gex_top_n: 7
validation:
  horizons_minutes:
  - 15
  - 60
  flat_threshold_pct: 0.001
  tolerance_minutes: 10
  max_horizon_drift_minutes: 10
  alignment_tolerance_sec: 900
  # Allow small forward drift between local as-of time and provider timestamps.
  # Useful when the host clock is slightly behind (e.g., VM / Windows time skew).
  allow_future_ts_seconds: 600
  emit_to_close_horizon: true
  use_default_required_features: false
  fallback_max_age_minutes: 15
  invalid_after_minutes: 60
  horizon_weights_source: model
  horizon_weights: {}
  horizon_weights_overrides:
    '15': {}
    '60': {}
    to_close: {}
  horizon_critical_features:
    '15':
    - spot
    - smart_whale_pressure
    - net_gex_sign
    - oi_pressure
    '60':
    - spot
    - smart_whale_pressure
    - net_gex_sign
    - oi_pressure
    to_close:
    - spot
    - smart_whale_pressure
    - net_gex_sign
    - oi_pressure
  label_contract:
    label_version: 2026.02.0
    session_boundary_rule: TRUNCATE_TO_SESSION_CLOSE
    flat_threshold_policy: ABS_RETURN_BAND
    threshold_policy_version: 2026.02.0
    contract_source: runtime_config
  decision_path_policy:
    contract_version: decision_path/v1
    zero_weight_is_non_decision: true
    require_feature_metadata: true
    allow_explicit_zero_weight_critical_override: true
    explicit_zero_weight_critical_features:
      '15': []
      '60': []
      to_close: []
  governance_mode: FORWARD_OBSERVATION
  output_domain_policy:
    contract_version: output_domain_policy/v1
    required_contract_version: output_domain/v1
    require_bounded_output_contract: true
    require_expected_bounds: true
    require_emitted_units: true
    require_raw_input_units: true
    require_output_domain: true
    require_bounded_output_flag: true
    degrade_on_missing_contract: true
    enforce_on_decision_eligible_only: true
network:
  base_url: ${UW_BASE_URL:-https://api.unusualwhales.com}
  timeout_seconds: 15
  max_retries: 3
  backoff_seconds:
  - 1.0
  - 3.0
  - 5.0
  max_concurrent_requests: 2
  rate_limit_per_second: 1
  circuit_breaker:
    failure_threshold: 5
    cool_down_seconds: 90
    half_open_max_calls: 1
storage:
  duckdb_path: ./uw_stack.duckdb
  writer_lock_path: ./uw_stack.duckdb.lock
  cycle_lock_path: ./uw_cycle.lock
model:
  model_name: bounded_additive_score
  model_version: 1.0.0
  target_spec:
    target_name: intraday_direction_3class
    target_version: 2026.02.0
    class_labels:
    - UP
    - DOWN
    - FLAT
    contract_source: runtime_config
    probability_tolerance: 1.0e-06
  confidence_cap: 0.55
  min_confidence: 0.35
  neutral_threshold: 0.55
  direction_margin: 0.08
  min_flat_prob: 0.15
  max_flat_prob: 0.65
  flat_from_data_quality_scale: 0.9
  weights:
    smart_whale_pressure: 1.0
    net_gex_sign: 0.6
    net_gamma_exposure_notional: 0.25
    dealer_vanna: 0.5
    dealer_charm: 0.35
    oi_pressure: 0.3
    darkpool_pressure: 0.0
    litflow_pressure: 0.25
    vol_term_slope: 0.15
    vol_skew: 0.1
    iv_rank: 0.05
  calibration_registry:
    registry_version: 2026.03.0
    default_regime: DEFAULT
    selection_policy:
      require_scope_match: true
      allow_legacy_fallback: false
      allow_generic_scope_fallback: true
      require_provenance: true
      required_provenance_fields:
      - trained_from_utc
      - trained_to_utc
      - valid_from_utc
      - valid_to_utc
      - evidence_ref
      - fit_sample_count
      institutional_grade: false
    artifacts:
    - artifact_name: bounded_additive_score_calibration
