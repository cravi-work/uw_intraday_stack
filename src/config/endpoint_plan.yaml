# Explicit endpoint plan.
# IMPORTANT: The runner validates (method,path,query params) against api_catalog.generated.yaml
# before calling. Every endpoint must declare an explicit runtime purpose contract.
#
# purpose meanings:
#   signal-critical -> contributes directly to extracted model features or signal-path fallbacks
#   context-only    -> fetched only for operator/market context, not for ticker signal scoring
#   report-only     -> supports persisted reporting artifacts but not live directional scoring
#   disabled        -> visible in the plan for auditability, but not fetched by default
#
# runtime contract invariants:
#   report-only/context-only/disabled => decision_path: false, missing/stale must not affect confidence
#   signal-critical                   => decision_path: true, missing/stale may affect confidence

contracts:
  signal_critical: &signal_critical_contract
    decision_path: true
    missing_affects_confidence: true
    stale_affects_confidence: true
  non_decision: &non_decision_contract
    decision_path: false
    missing_affects_confidence: false
    stale_affects_confidence: false

plans:
  default:
    # Price / core signal path
    - name: ohlc_1m
      purpose: signal-critical
      <<: *signal_critical_contract
      method: GET
      path: /api/stock/{ticker}/ohlc/{candle_size}
      path_params:
        candle_size: "1m"
      query_params:
        date: "{date}"
        limit: 700

    - name: stock_volume_price_levels
